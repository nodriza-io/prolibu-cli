# ──────────────────────────────────────────────────────────────
# pipelines.yml — Execution order, batching & phase config
# ──────────────────────────────────────────────────────────────
#
# Controls HOW the migration runs: which entities in what order,
# batch sizes, concurrency, and phase definitions.
#
# Pipeline options:
#   order       Ordered list of entity keys to process
#   batchSize   Records per API call (default 200)
#   concurrency Max parallel API calls (default 1)
#   onError     "skip" | "abort" — behaviour on record failure
#
# Phases defines the migration workflow steps.
#
# ──────────────────────────────────────────────────────────────

pipeline:
  order:
    - accounts
    - products
    - contacts
    - opportunities
  batchSize: 200
  concurrency: 1
  onError: skip

phases:
  - key: discover
    label: Discovery
    description: Scan CRM and discover available objects and fields
  - key: review
    label: Review & Configure
    description: Review discovered objects, select entities and fields
  - key: migrate
    label: Migration
    description: Execute data migration from CRM to Prolibu
