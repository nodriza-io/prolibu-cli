# ──────────────────────────────────────────────────────────────
# schema.yml — Entities to include in the migration
# ──────────────────────────────────────────────────────────────
#
# Each key is a logical entity name. The CRM-specific source object
# and the target Prolibu model are declared here.
#
# Fields:
#   source      CRM object name (e.g. Account, Contact, Product2)
#   target      Prolibu model name (e.g. Company, Contact, Product)
#   enabled     Whether this entity is included in migration runs
#   idField     Prolibu field used as the external ID (default: externalId)
#   select      Fields to query from the CRM (SOQL select list, GraphQL fields, etc.)
#   filters     Optional CRM query filters
#
# Join (N:1 merge):
#   Allows fetching related CRM records and merging them into the
#   primary entity. Useful when the CRM has separate objects that
#   map to a single Prolibu model (e.g. Opportunity + Quote → Deal).
#
#   join:
#     - source      CRM child object name (e.g. Quote)
#       foreignKey  Field in the child that references the parent (e.g. OpportunityId)
#       strategy    How to pick records: "latest" | "all" | "primary"
#                     latest  → most recent by CreatedDate (default)
#                     primary → the one marked as primary/syncing (if applicable)
#                     all     → fetch all related records (returns array)
#       as          Alias key used in mappings.yml (joinedFields.<as>)
#       select      Optional SOQL select for the joined object
#
# ──────────────────────────────────────────────────────────────

entities:
  # ── Core CRM objects ────────────────────────────────────────
  accounts:
    source: Account
    target: company
    enabled: true
    idField: externalId

  contacts:
    source: Contact
    target: contact
    enabled: true
    idField: externalId

  leads:
    source: Lead
    target: contact
    enabled: true
    idField: externalId

  opportunities:
    source: Opportunity
    target: deal
    enabled: true
    idField: externalId
    # ── N:1 joins ──────────────────────────────────────────────
    # Prolibu's Deal embeds Quote + LineItem data inside
    # proposal.quote.* — so we fetch them from SF and merge.
    join:
      - source: Quote
        foreignKey: OpportunityId
        strategy: latest # pick the most recent Quote
        as: quote # referenced in mappings.yml → joinedFields.quote
        select: "Id, Name, QuoteNumber, Status, ExpirationDate, GrandTotal, Discount, Tax, ShippingHandling, Description"
      - source: QuoteLineItem
        foreignKey: QuoteId # linked via the joined Quote's Id
        parentJoin: quote # fetch using the resolved Quote's Id, not the Opportunity's Id
        strategy: all # all line items
        as: lineItems
        select: "Id, Quantity, UnitPrice, TotalPrice, Discount, Description, Product2Id, PricebookEntryId"

  # Quote is merged into Deal via join above — kept here for
  # standalone migration if ever needed, but disabled by default.
  quotes:
    source: Quote
    target: quote
    enabled: false
    idField: externalId

  contracts:
    source: Contract
    target: contract
    enabled: false
    idField: externalId

  cases:
    source: Case
    target: ticket
    enabled: false
    idField: externalId

  # ── Products & pricing ─────────────────────────────────────
  products:
    source: Product2
    target: product
    enabled: true
    idField: externalId

  pricebooks:
    source: Pricebook2
    target: pricebook
    enabled: false
    idField: externalId

  pricebookentries:
    source: PricebookEntry
    target: pricebookentry
    enabled: false
    idField: externalId

  lineitems:
    source: OpportunityLineItem
    target: lineitem
    enabled: false
    idField: externalId

  # ── Activities ─────────────────────────────────────────────
  tasks:
    source: Task
    target: task
    enabled: false
    idField: externalId

  events:
    source: Event
    target: meeting
    enabled: false
    idField: externalId

  notes:
    source: Note
    target: note
    enabled: false
    idField: externalId

  calls:
    source: Call
    target: call
    enabled: false
    idField: externalId

  # ── Marketing ──────────────────────────────────────────────
  campaigns:
    source: Campaign
    target: campaign
    enabled: false
    idField: externalId

  # ── People & teams ─────────────────────────────────────────
  users:
    source: User
    target: user
    enabled: false
    idField: externalId

  # ── Invoicing ──────────────────────────────────────────────
  invoices:
    source: Invoice
    target: invoice
    enabled: false
    idField: externalId
